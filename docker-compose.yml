name: znkfxt-local

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-znkfxt}
      POSTGRES_USER: ${POSTGRES_USER:-znkfxt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-znkfxt_local_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  api:
    image: node:24-alpine
    profiles:
      - app
    working_dir: /workspace
    env_file:
      - ./config/env/.env.local.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-znkfxt}:${POSTGRES_PASSWORD:-znkfxt_local_password}@postgres:5432/${POSTGRES_DB:-znkfxt}
      REDIS_URL: redis://redis:6379
      VITE_API_BASE_URL: http://localhost:${API_PORT:-3000}
    ports:
      - '${API_PORT:-3000}:3000'
    volumes:
      - ./:/workspace
    command: ['sh', '-lc', 'npm --workspace @znkfxt/api run dev']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: node:24-alpine
    profiles:
      - app
    working_dir: /workspace
    env_file:
      - ./config/env/.env.local.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-znkfxt}:${POSTGRES_PASSWORD:-znkfxt_local_password}@postgres:5432/${POSTGRES_DB:-znkfxt}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./:/workspace
    command: ['sh', '-lc', 'npm --workspace @znkfxt/api run worker:dev']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  static:
    image: nginx:1.27-alpine
    profiles:
      - static
    ports:
      - '${STATIC_PORT:-8080}:80'
    volumes:
      - ./infra/local/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./apps/web-widget/dist:/usr/share/nginx/html/web-widget:ro
      - ./apps/agent-console/dist:/usr/share/nginx/html/agent-console:ro
      - ./apps/admin-console/dist:/usr/share/nginx/html/admin-console:ro
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
