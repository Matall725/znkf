server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;

  location / {
    try_files $uri $uri/ =404;
  }

  location /web-widget/ {
    alias /usr/share/nginx/html/web-widget/;
    try_files $uri $uri/ =404;
  }

  location /agent-console/ {
    alias /usr/share/nginx/html/agent-console/;
    try_files $uri $uri/ /agent-console/index.html =404;
  }

  location /admin-console/ {
    alias /usr/share/nginx/html/admin-console/;
    try_files $uri $uri/ /admin-console/index.html =404;
  }
}
